<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Produtos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="topbar">
        <div class="topbar-inner">
            <a class="topbar-brand" href="index.html">
                <span class="brand-name">Prazu<span>Oficial<span></span>
            </a>
            <div class="topbar-nav">
                <a class="nav-link" href="index.html">Início</a>
                <a class="nav-link active" href="produtos.html">Produtos</a>
                <a class="nav-link" href="perfil.html">Perfil</a>
            </div>
            <div class="topbar-actions">
                <button id="topbar-logout" class="secondary small is-hidden" type="button">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container app-page">
        <section class="card app-card">
            <div class="card-header app-header">
                <div>
                    <h2 class="app-subtitle">Gestão de produtos</h2>
                    <p class="app-muted">Use visualização solta, kanban ou tabela.</p>
                </div>
                <button id="btn-novo-produto" type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#produtoModal">Novo produto</button>
            </div>

            <div class="view-switch-simple" role="tablist" aria-label="Modo de visualização">
                <button id="view-cards" class="small active" type="button">Cards</button>
                <button id="view-kanban" class="small" type="button">Kanban</button>
                <button id="view-table" class="small" type="button">Tabela</button>
            </div>

            <div id="resultado"></div>
        </section>

        <section id="produtos-cards-wrapper">
            <div id="lista-produtos-cards" class="produtos-grid"></div>
        </section>

        <section id="produtos-kanban-wrapper" class="is-hidden">
            <div class="kanban-board">
                <div class="kanban-column" data-status="novo">
                    <h3>Novo</h3>
                    <div id="kanban-novo" class="kanban-list"></div>
                </div>
                <div class="kanban-column" data-status="valido">
                    <h3>Dentro da Validade</h3>
                    <div id="kanban-valido" class="kanban-list"></div>
                </div>
                <div class="kanban-column" data-status="vencido">
                    <h3>Vencido</h3>
                    <div id="kanban-vencido" class="kanban-list"></div>
                </div>
            </div>
        </section>

        <section id="produtos-tabela-wrapper" class="table-wrapper is-hidden">
            <table>
                <thead>
                    <tr>
                        <th>#ID</th>
                        <th>Título</th>
                        <th>Data de Fabricação</th>
                        <th>Data de Validade</th>
                        <th>Quantidade</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="lista-produtos-tabela"></tbody>
            </table>
        </section>
    </div>

    <footer>Prazu- Controle de Validade</footer>

    <div class="modal fade" id="produtoModal" tabindex="-1" aria-labelledby="produtoModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form id="form-produto" class="prazu-form-modal">
                    <div class="modal-header">
                        <h5 class="modal-title" id="produtoModalTitle">Novo produto</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="produto-id">
                        <div class="form-field">
                            <label for="produto-titulo">Título</label>
                            <input type="text" id="produto-titulo" placeholder="Ex: Macarrão" required>
                        </div>
                        <div class="form-field">
                            <label for="produto-data-fabricacao">Data de Fabricação</label>
                            <input type="date" id="produto-data-fabricacao" placeholder="ex:02/05/2026" required/>
                        </div>
                        <div class="form-field">
                            <label for="produto-data-validade">Data de Validade</label>
                            <input type="date" id="produto-data-validade" placeholder="ex:09/11/2026" required />
                        </div>
                        <div class="form-field">
                            <label for="produto-quantidade">Quantidade</label>
                            <input type="number"  id="produto-quantidade" placeholder="Ex: 3" required>
                        </div>
                        <div class="form-field">
                            <label for="produto-foto">Foto</label>
                            <input type="file"  id="produto-foto" >
                        </div>
                        <div class="form-field status-field">
                            <label for="produto-status">Status</label>
                            <select id="produto-status">
                                <option value="novo">Novo</option>
                                <option value="valido">Dentro da validade</option>
                                <option value="vencido">Vencido</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button id="btn-modal-excluir" type="button" class="btn btn-outline-danger is-hidden">Excluir</button>
                        <button id="btn-modal-editar" type="button" class="btn btn-outline-primary is-hidden">Editar</button>
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button id="btn-modal-salvar" type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script src="js/produtos.js"></script>
</body>
</html>
